<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | Omar_Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- مكتبة EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-[#0D48A1]">استعادة الحساب</h2>
            <p id="statusText" class="text-gray-500 mt-2">أدخل بريدك الإلكتروني لاستلام رمز التحقق (OTP)</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <!-- خانة البريد الإلكتروني -->
            <div id="emailSection">
                <label class="block text-sm font-bold text-gray-700 mb-2">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" required 
                    class="w-full border border-gray-300 rounded-lg h-12 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="example@mail.com">
            </div>

            <!-- خانة إدخال الكود (مخفية تظهر بعد الإرسال) -->
            <div id="otpSection" class="hidden">
                <label class="block text-sm font-bold text-gray-700 mb-2">أدخل رمز التحقق (6 أرقام)</label>
                <input type="text" id="otpInput" maxlength="6"
                    class="w-full border border-gray-300 rounded-lg h-12 px-4 text-center tracking-widest text-2xl font-bold outline-none focus:ring-2 focus:ring-green-500"
                    placeholder="000000">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#0D48A1] text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-all shadow-md">
                إرسال الرمز
            </button>
        </form>

        <div class="mt-6 text-center">
            <a class='text-[#0D48A1] font-semibold hover:underline' href='login.html'>العودة لتسجيل الدخول</a>
        </div>
    </div>

    <script>
        // --- 1. إعداد EmailJS ---
        (function() {
            emailjs.init({
              publicKey: "VEI7rBamzfACUi_aJ", 
            });
        })(); 

        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const emailSection = document.getElementById('emailSection');
        const otpSection = document.getElementById('otpSection');
        const statusText = document.getElementById('statusText');

        let generatedOTP = "";

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // الحالة الأولى: إرسال الرمز
            if (otpSection.classList.contains('hidden')) {
                const email = document.getElementById('resetEmail').value;
                
                // توليد كود 6 أرقام
                generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

                submitBtn.disabled = true;
                submitBtn.innerText = "جاري الإرسال...";

                const templateParams = {
                    user_email: email,
                    code: generatedOTP
                };

                // إرسال عبر EmailJS
                emailjs.send('service_vt4xd9t', 'template_sfo4hg8', templateParams)
                    .then(() => {
                        alert("✅ تم إرسال الرمز بنجاح!");
                        
                        // إظهار خانة الرمز وإخفاء الإيميل
                        emailSection.style.display = 'none'; // زيادة تأكيد الإخفاء
                        otpSection.classList.remove('hidden');
                        
                        statusText.innerText = "تم إرسال الرمز إلى " + email;
                        submitBtn.innerText = "تأكيد الرمز";
                        submitBtn.style.backgroundColor = "#10b981"; 
                        submitBtn.disabled = false;
                    })
                    .catch((error) => {
                        console.error("EmailJS Error:", error);
                        alert("❌ فشل الإرسال: تأكد من إعدادات EmailJS أو اتصال الإنترنت.");
                        submitBtn.disabled = false;
                        submitBtn.innerText = "إعادة المحاولة";
                    });

            } else {
                // الحالة الثانية: التحقق من الرمز
                const userOTP = document.getElementById('otpInput').value;

                if (userOTP === generatedOTP) {
                    alert("✅ الرمز صحيح! جاري تحويلك...");
                    // window.location.href = "new-password.html"; 
                } else {
                    alert("❌ الرمز غير صحيح، حاول مرة أخرى.");
                }
            }
        });
    </script>
</body>
</html>
