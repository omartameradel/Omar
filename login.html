<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar_Media Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .bg-circuit {
            background-image: url('https://www.transparenttextures.com/patterns/circuit-board.png');
            background-color: #f3f4f6;
        }
        #support-modal { display: none; }
        #support-modal.open { display: flex; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <div class="hidden md:flex md:w-1/2 bg-circuit flex-col items-center justify-center p-12 text-center border-l border-gray-200">
        <h1 class="text-5xl font-bold text-[#0D48A1] mb-6">Omar_Media</h1>
        <h2 class="text-2xl font-bold text-black mb-8">Pro</h2>
        <p class="font-semibold text-gray-700 text-lg">"منصة Omar_Media - منصة متخصصة في مشاركة الوسائط والبرمجة بواسطة عمر تامر"</p>
    </div>

    <div class="w-full md:w-1/2 flex items-center justify-center p-8 relative">
        <div class="w-full max-w-md flex flex-col items-center">
            <div class="mb-8">
                <img src="https://omartamer.netlify.app/Omar_Media.png" class="h-16" alt="Logo">
            </div>
            <h3 class="text-2xl font-bold text-[#0D48A1] mb-2">مرحبًا بعودتك</h3>
            
            <form id="loginForm" class="w-full space-y-5 mt-6">
                <input type="email" id="email" class="w-full border border-gray-300 rounded-lg h-12 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500" placeholder="البريد الإلكتروني" required>
                
                <div class="space-y-2">
                    <input type="password" id="password" class="w-full border border-gray-300 rounded-lg h-12 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500" placeholder="كلمة المرور" required>
   <div class="text-right">
    <a href="forgot password.html" class="text-sm font-semibold text-blue-600 hover:text-[#0D48A1] hover:underline transition-all">
        هل نسيت كلمة المرور؟
    </a>
</div>
                </div>

                <button type="submit" class="w-full bg-[#0D48A1] text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-colors shadow-lg">تسجيل الدخول</button>
            </form>
        </div>
    </div>

    <button onclick="toggleSupport()" class="fixed bottom-6 left-6 bg-[#0D48A1] text-white px-5 py-2.5 rounded-full flex items-center gap-2 shadow-xl hover:scale-105 transition-transform z-40">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        <span class="text-sm font-bold">هل تحتاج مساعدة؟</span>
    </button>

    <div id="support-modal" class="fixed inset-0 z-50 items-center justify-center bg-black/50 p-4">
        <div class="bg-white w-full max-w-md rounded-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="bg-gray-100 p-4 flex justify-between items-center border-b">
                <h2 class="text-lg font-semibold text-[#0D48A1]">مركز الدعم</h2>
                <button onclick="toggleSupport()" class="text-gray-500 hover:text-red-500 text-xl">✕</button>
            </div>
            <form class="p-6 space-y-4 overflow-y-auto">
                <div>
                    <label class="block text-sm font-bold text-gray-700">الاسم بالكامل</label>
                    <input type="text" class="w-full border border-gray-300 rounded-md h-11 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب اسمك هنا">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">الموضوع</label>
                    <input type="text" class="w-full border border-gray-300 rounded-md h-11 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500" placeholder="ملخص المشكلة">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">الوصف التفصيلي</label>
                    <textarea class="w-full border border-gray-300 rounded-md h-24 p-3 text-right outline-none focus:ring-2 focus:ring-blue-500 resize-none" placeholder="اشرح مشكلتك..."></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-[#0D48A1] text-white py-2.5 rounded-md font-bold">إرسال التذكرة</button>
                    <button type="button" onclick="toggleSupport()" class="flex-1 border border-gray-300 py-2.5 rounded-md font-bold text-gray-600">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
    // 1. استيراد المكتبات
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // 2. إعدادات Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyAhDmoZVk1nW2SvrXawD7IlIUtr7kRCk98",
        authDomain: "photo-19b48.firebaseapp.com",
        projectId: "photo-19b48",
        storageBucket: "photo-19b48.firebasestorage.app",
        messagingSenderId: "661677924920",
        appId: "1:661677924920:web:94de5f445904e0036ebccd",
        measurementId: "G-4MDMCEQMMG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // --- وظائف النافذة (المودال) ---
    // تعريفها على window لتراها أزرار الـ HTML
    window.toggleSupport = function() {
        const modal = document.getElementById('support-modal');
        if (modal) {
            modal.classList.toggle('open');
        }
    };

    // إغلاق المودال عند الضغط خارجه
    window.onclick = function(event) {
        const modal = document.getElementById('support-modal');
        if (event.target == modal) {
            modal.classList.remove('open');
        }
    };

    // --- وظيفة تسجيل الدخول ---
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                alert("تم الدخول بنجاح! مرحباً بك يا بطل.");
                window.location.href = "home.html";
            })
            .catch((error) => {
                alert("خطأ: " + error.message);
            });
    });



</script>
</body>
</html>
