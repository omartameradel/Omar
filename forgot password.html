<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | Omar_Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-[#0D48A1]">استعادة الحساب</h2>
            <p class="text-gray-500 mt-2">أدخل بريدك الإلكتروني لإرسال رابط تعيين كلمة المرور</p>
        </div>

        <form id="resetForm" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" required 
                    class="w-full border border-gray-300 rounded-lg h-12 px-4 text-right outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="example@mail.com">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-[#0D48A1] text-white font-bold py-3 rounded-lg hover:bg-blue-800 transition-all shadow-md">
                إرسال الرابط
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-[#0D48A1] font-semibold hover:underline">العودة لتسجيل الدخول</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAhDmoZVk1nW2SvrXawD7IlIUtr7kRCk98",
            authDomain: "photo-19b48.firebaseapp.com",
            projectId: "photo-19b48",
            storageBucket: "photo-19b48.firebasestorage.app",
            messagingSenderId: "661677924920",
            appId: "1:661677924920:web:94de5f445904e0036ebccd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            sendPasswordResetEmail(auth, email)
                .then(() => {
                    alert("تم إرسال الرابط! تفقد بريدك الإلكتروني.");
                    window.location.href = "login.html"; // يعيده لصفحة الدخول
                })
                .catch((error) => {
                    alert("خطأ: " + error.message);
                    btn.disabled = false;
                    btn.innerText = "إرسال الرابط";
                });
        });
    </script>
</body>
</html>
