<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar_Media | Smart Presenter</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-color: #0f0c29;
            --accent-color: #00d2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* شاشة الرفع */
        #upload-screen {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            text-align: center;
        }

        .upload-box {
            background: var(--glass);
            padding: 50px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 2px dashed var(--accent-color);
            cursor: pointer;
            transition: 0.3s;
        }

        .upload-box:hover { background: rgba(255, 255, 255, 0.2); }

        /* منطقة العرض */
        #viewer-container {
            display: none;
            width: 100vw; height: 100vh;
            position: relative;
        }

        canvas#drawing-canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: 10;
            cursor: crosshair;
            display: none; /* يظهر عند تفعيل القلم */
        }

        iframe#pptx-viewer {
            width: 100%; height: 100%;
            border: none;
        }

        /* شريط الأدوات العائم */
        .toolbar {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 30px;
            border-radius: 50px;
            display: flex; gap: 20px;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid var(--accent-color);
        }

        .tool-btn {
            background: none; border: none;
            color: white; font-size: 1.2rem;
            cursor: pointer; transition: 0.3s;
        }

        .tool-btn:hover { color: var(--accent-color); transform: scale(1.2); }
        .tool-btn.active { color: #ff4757; }

        /* استايل الأزرار التفاعلية */
        .interaction-layer {
            position: absolute;
            top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
            z-index: 20;
        }

        .glass-btn {
            background: var(--glass);
            border: 1px solid white;
            color: white; padding: 10px 20px;
            border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <!-- شاشة رفع الملف -->
    <div id="upload-screen">
        <div class="upload-box" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt fa-4x" style="color: var(--accent-color);"></i>
            <h2>زعيم البرمجة: ارفع ملف الـ PPTX هنا</h2>
            <p>سيتم تشغيل العرض التفاعلي فوراً</p>
            <input type="file" id="fileInput" hidden accept=".pptx, .ppt">
        </div>
    </div>

    <!-- منطقة العرض -->
    <div id="viewer-container">
        <!-- طبقة الرسم (القلم) -->
        <canvas id="drawing-canvas"></canvas>

        <!-- طبقة التفاعل (أزرار سريعة) -->
        <div class="interaction-layer">
            <button class="glass-btn" onclick="toggleFullScreen()"><i class="fas fa-expand"></i> ملء الشاشة</button>
            <button class="glass-btn" onclick="location.reload()"><i class="fas fa-home"></i> شاشة البداية</button>
        </div>

        <!-- العارض (باستخدام محرك Office Online لضمان تشغيل الـ Triggers) -->
        <iframe id="pptx-viewer"></iframe>

        <!-- شريط التحكم السفلي -->
        <div class="toolbar">
            <button class="tool-btn" onclick="changeSlide('prev')"><i class="fas fa-chevron-right"></i></button>
            <button class="tool-btn" id="pen-btn" onclick="togglePen()"><i class="fas fa-pen"></i></button>
            <button class="tool-btn" onclick="clearCanvas()"><i class="fas fa-eraser"></i></button>
            <button class="tool-btn" onclick="changeSlide('next')"><i class="fas fa-chevron-left"></i></button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadScreen = document.getElementById('upload-screen');
        const viewerContainer = document.getElementById('viewer-container');
        const pptxViewer = document.getElementById('pptx-viewer');
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');

        let isDrawing = false;
        let penActive = false;

        // 1. معالجة رفع الملف
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                // ملاحظة: لعرض ملف محلي بـ Triggers كاملة، يفضل رفعه على سيرفر أو OneDrive
                // هنا نستخدم محاكي العرض السريع
                const url = URL.createObjectURL(file);
                
                // تنبيه: لفتح Triggers البوربوينت الحقيقية داخل المتصفح، 
                // نستخدم عرض Office Online (يتطلب أن يكون الملف مرفوعاً أونلاين)
                // كحل بديل للبرمجة المحلية، سنعرض الملف في الـ iframe
                pptxViewer.src = `https://view.officeapps.live.com/op/view.aspx?src=${encodeURIComponent(url)}`;
                
                uploadScreen.style.display = 'none';
                viewerContainer.style.display = 'block';
                setupCanvas();
            }
        });

        // 2. نظام القلم (Drawing System)
        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.strokeStyle = '#ff4757';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
        }

        function togglePen() {
            penActive = !penActive;
            const btn = document.getElementById('pen-btn');
            if (penActive) {
                canvas.style.display = 'block';
                btn.classList.add('active');
            } else {
                canvas.style.display = 'none';
                btn.classList.remove('active');
            }
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvas.addEventListener('mousemove', draw);

        function draw(e) {
            if (!isDrawing || !penActive) return;
            ctx.lineTo(e.clientX, e.clientY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 3. ملء الشاشة
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 4. التحكم في الشرائح (عن طريق إرسال أوامر لـ iframe إذا كان مدعوماً)
        function changeSlide(dir) {
            // في عرض Office Online، التنقل يكون عبر الأزرار المدمجة في الـ iframe 
            // لكن يمكننا إضافة تنبيه للمستخدم
            alert(dir === 'next' ? "اضغط على المسطرة أو السهم لليمين" : "اضغط على السهم لليسار");
        }

        window.onresize = setupCanvas;
    </script>
</body>
</html>
